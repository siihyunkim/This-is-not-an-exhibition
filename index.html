<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이것은 전시가 아니다</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #fff;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    display: flex;
    flex-direction: column;
    color: #000;
  }

  /* ── TITLE ── */
  #title-section {
    flex-shrink: 0;
    text-align: center;
    padding: 20px 32px 14px;
    line-height: 1.15;
  }
  #title-section h1 {
    font-size: clamp(20px, 3.2vw, 50px);
    font-weight: 800;
    letter-spacing: -0.01em;
  }
  #title-section h2 {
    font-size: clamp(16px, 2.6vw, 40px);
    font-weight: 700;
    letter-spacing: 0.03em;
    margin-top: 2px;
  }

  /* ── STAGE ── */
  #stage {
    flex: 1;
    position: relative;
    overflow: hidden;
    user-select: none;
  }

  /* ── SVG ── */
  #svg-lines {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  /* ── COLUMN DECORATIONS ── */
  .col-axis {
    position: absolute;
    top: 18px; bottom: 18px;
    width: 0;
    transform: translateX(-50%);
    border-left: 1px dashed #ccc;
    pointer-events: none;
  }
  .col-arrow {
    position: absolute;
    color: #aaa;
    font-size: 10px;
    transform: translateX(-50%);
    pointer-events: none;
    line-height: 1;
  }
  .col-arrow.up { top: 4px; }
  .col-arrow.dn { bottom: 4px; }

  /* ── ITEMS ── */
  .item {
    position: absolute;
    cursor: pointer;
    display: flex;
    align-items: center;
    /* transform set per-column in JS */
  }
  .item-label {
    font-size: 10px;
    letter-spacing: 0.03em;
    white-space: nowrap;
    color: #000;
    line-height: 1.4;
    transition: color 0.35s;
  }
  .item.active   .item-label { color: #000; font-weight: 700; }
  .item.dimmed   .item-label { color: #c0c0c0; }

  /* ── FOOTER ── */
  #footer {
    flex-shrink: 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding: 8px 28px 14px;
  }
  .footer-col {
    font-size: 8.5px;
    line-height: 1.7;
    color: #888;
    letter-spacing: 0.02em;
    flex: 1;
  }
  .footer-col:nth-child(2) { text-align: center; }
  .footer-col:nth-child(3) { text-align: right; }
</style>
</head>
<body>

<!-- TITLE -->
<div id="title-section">
  <h1>This is not an exhibition</h1>
  <h2>이것은 전시가 아니다</h2>
</div>

<!-- STAGE -->
<div id="stage">
  <svg id="svg-lines"></svg>
</div>

<!-- FOOTER -->
<footer id="footer">
  <div class="footer-col">
    홍익대학교 시각디자인과(23)<br>
    지도교수 석재원
  </div>
  <div class="footer-col">
    개인별 도슨트 참여 안내<br>
    2025년 4월 20일(월) — 4월 24일(금)<br>
    홍익대학교 홍문관 7층 777
  </div>
  <div class="footer-col">
    개인별 도슨트 참여 안내<br>
    2025년 4월 20일(월) — 4월 24일(금)<br>
    홍익대학교 홍문관 7층 777
  </div>
</footer>

<script>
/* ─────────────────────────────
   DATA — 27 artists
───────────────────────────── */
const artists = [
  { a: "모기",          name: "김세민",   b: "예술가" },
  { a: "캡챠",          name: "여단아",   b: "로봇의 메시지" },
  { a: "건강보조제",    name: "박장호",   b: "요약본" },
  { a: "손씻기",        name: "김민지",   b: "비술" },
  { a: "QR코드",        name: "배유진",   b: "자서전" },
  { a: "입",            name: "김지원",   b: "팩스기" },
  { a: "사거리",        name: "백단하",   b: "갤러리" },
  { a: "슬립오버",      name: "이린",     b: "고해성사" },
  { a: "커팅매트",      name: "황철호",   b: "해시계" },
  { a: "세탁소",        name: "조서영",   b: "화원" },
  { a: "스틸레토 힐",   name: "정지은",   b: "은닉무기" },
  { a: "라바콘",        name: "김규빈",   b: "만병통치약" },
  { a: "만두",          name: "강다현",   b: "암살자" },
  { a: "주석",          name: "강민서",   b: "무단점유자" },
  { a: "손톱",          name: "이지희",   b: "플레이리스트" },
  { a: "지도",          name: "정우현",   b: "시" },
  { a: "스케이트보드",  name: "김주현",   b: "스캐너" },
  { a: "눈",            name: "양정원",   b: "포장지" },
  { a: "이어폰",        name: "김성재",   b: "탯줄" },
  { a: "약봉투",        name: "현지우",   b: "어드밴트 캘린더" },
  { a: "책",            name: "오성건",   b: "죄수" },
  { a: "벌금 고지서",   name: "양의열",   b: "러브레터" },
  { a: "마침표",        name: "황지원",   b: "골" },
  { a: "쓰레기통",      name: "최주혁",   b: "자유게시판" },
  { a: "레이빙",        name: "김시현",   b: "굿" },
  { a: "스크린샷",      name: "김세은",   b: "소매치기" },
  { a: "페퍼민트 캔디", name: "XU NING",  b: "국제 통용 화폐" },
];

const N = artists.length;
// A축 = 13%, 작업자 = 50%, B축 = 87%
const COL_FRACS = [0.13, 0.50, 0.87];
const PAD_V = 22;

/* ─────────────────────────────
   STATE
───────────────────────────── */
let activeIdx    = null;
let prevActiveIdx = -2;
let stageW = 0, stageH = 0;
let colX   = [];

const pos     = [new Array(N).fill(0), new Array(N).fill(0), new Array(N).fill(0)];
const itemEls = [[], [], []];
let linePathsA  = [], linePathsB  = [];
let clickPathsA = [], clickPathsB = [];

const stage = document.getElementById('stage');
const svgEl = document.getElementById('svg-lines');

/* ─────────────────────────────
   UTILS
───────────────────────────── */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ─────────────────────────────
   LAYOUT
───────────────────────────── */
function computeLayout() {
  stageW = stage.offsetWidth;
  stageH = stage.offsetHeight;
  colX   = COL_FRACS.map(f => f * stageW);
  svgEl.setAttribute('viewBox', `0 0 ${stageW} ${stageH}`);
  svgEl.setAttribute('width',   stageW);
  svgEl.setAttribute('height',  stageH);
}

function assignPositions(col, order) {
  const span = stageH - PAD_V * 2;
  const step = N > 1 ? span / (N - 1) : 0;
  order.forEach((artistIdx, rank) => {
    pos[col][artistIdx] = PAD_V + rank * step;
  });
}

/* ─────────────────────────────
   INTERACTION
───────────────────────────── */
function setActive(idx) {
  if (activeIdx === idx) return;
  activeIdx = idx;
  updateStyles();
}

function updateStyles() {
  for (let col = 0; col < 3; col++) {
    for (let i = 0; i < N; i++) {
      const el = itemEls[col][i];
      if (!el) continue;
      el.classList.remove('active', 'dimmed');
      if (activeIdx !== null) {
        if (i === activeIdx) el.classList.add('active');
        else                 el.classList.add('dimmed');
      }
    }
  }
}

/* ─────────────────────────────
   BUILD DOM
───────────────────────────── */
function buildDOM() {
  stage.querySelectorAll('.item, .col-axis, .col-arrow').forEach(e => e.remove());
  svgEl.innerHTML = '';
  linePathsA = []; linePathsB = [];
  clickPathsA = []; clickPathsB = [];
  for (let c = 0; c < 3; c++) itemEls[c] = [];

  // 축선 + 화살표
  for (let col = 0; col < 3; col++) {
    const axis = document.createElement('div');
    axis.className = 'col-axis';
    axis.style.left = colX[col] + 'px';
    stage.appendChild(axis);

    ['up', 'dn'].forEach(dir => {
      const el = document.createElement('div');
      el.className = `col-arrow ${dir}`;
      el.style.left = colX[col] + 'px';
      el.textContent = dir === 'up' ? '↑' : '↓';
      stage.appendChild(el);
    });
  }

  // SVG 라인
  for (let i = 0; i < N; i++) {
    [linePathsA, linePathsB].forEach(arr => {
      const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      p.setAttribute('fill', 'none');
      p.setAttribute('stroke', '#000');
      p.setAttribute('stroke-width', '0.7');
      svgEl.appendChild(p);
      arr.push(p);
    });
  }

  // 클릭 오버레이
  for (let i = 0; i < N; i++) {
    [clickPathsA, clickPathsB].forEach(arr => {
      const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      p.setAttribute('fill', 'none');
      p.setAttribute('stroke', 'transparent');
      p.setAttribute('stroke-width', '14');
      p.style.cursor = 'pointer';
      p.style.pointerEvents = 'stroke';
      const ci = i;
      p.addEventListener('click', () => setActive(ci));
      svgEl.appendChild(p);
      arr.push(p);
    });
  }

  // 컬럼별 transform & 정렬
  // A: 텍스트가 축선 왼쪽에 오른맞춤
  // 작업자: 축선 중앙
  // B: 텍스트가 축선 오른쪽에 왼맞춤
  const transforms   = [
    'translateX(-100%) translateY(-50%)',
    'translateX(-50%)  translateY(-50%)',
    'translateX(0%)    translateY(-50%)',
  ];
  const justifys     = ['flex-end', 'center', 'flex-start'];
  const textAligns   = ['right', 'center', 'left'];
  const widths       = [
    Math.max(60, colX[0] - 6) + 'px',
    '110px',
    Math.max(60, stageW - colX[2] - 6) + 'px',
  ];

  for (let col = 0; col < 3; col++) {
    for (let i = 0; i < N; i++) {
      const el = document.createElement('div');
      el.className = 'item';
      el.style.left           = colX[col] + 'px';
      el.style.top            = '0px';
      el.style.transform      = transforms[col];
      el.style.width          = widths[col];
      el.style.justifyContent = justifys[col];

      const label = document.createElement('div');
      label.className = 'item-label';
      label.style.textAlign = textAligns[col];
      label.textContent = col === 0 ? artists[i].a
                        : col === 1 ? artists[i].name
                        :             artists[i].b;
      el.appendChild(label);

      const ci = i;
      el.addEventListener('click', () => setActive(ci));
      stage.appendChild(el);
      itemEls[col][i] = el;
    }
  }
}

/* ─────────────────────────────
   DRAW LINES
───────────────────────────── */
function drawLines() {
  for (let i = 0; i < N; i++) {
    const yA = pos[0][i], yM = pos[1][i], yB = pos[2][i];
    const isActive = (i === activeIdx);
    const isDimmed = (activeIdx !== null && !isActive);
    const color = isDimmed ? '#d0d0d0' : '#000';
    const width = isActive ? '1.6' : '0.7';

    // 라인은 각 축선 사이를 직선으로 연결
    const dA = `M ${colX[0]} ${yA} L ${colX[1]} ${yM}`;
    const dB = `M ${colX[1]} ${yM} L ${colX[2]} ${yB}`;

    linePathsA[i].setAttribute('d', dA);
    linePathsA[i].setAttribute('stroke', color);
    linePathsA[i].setAttribute('stroke-width', width);
    linePathsB[i].setAttribute('d', dB);
    linePathsB[i].setAttribute('stroke', color);
    linePathsB[i].setAttribute('stroke-width', width);
    clickPathsA[i].setAttribute('d', dA);
    clickPathsB[i].setAttribute('d', dB);
  }

  // 선택된 라인을 SVG 맨 위로
  if (activeIdx !== prevActiveIdx) {
    prevActiveIdx = activeIdx;
    if (activeIdx !== null) {
      svgEl.appendChild(linePathsA[activeIdx]);
      svgEl.appendChild(linePathsB[activeIdx]);
      svgEl.appendChild(clickPathsA[activeIdx]);
      svgEl.appendChild(clickPathsB[activeIdx]);
    }
  }
}

/* ─────────────────────────────
   DRAW-IN ANIMATION
───────────────────────────── */
const DRAW_STAGGER  = 28;
const DRAW_DURATION = 220;
let drawStart = null;

function easeOut(t) { return 1 - Math.pow(1 - t, 2); }

function startDrawAnim() {
  drawStart = performance.now();
  for (let i = 0; i < N; i++) {
    linePathsA[i]._len = linePathsA[i].getTotalLength() || 1;
    linePathsB[i]._len = linePathsB[i].getTotalLength() || 1;
    linePathsA[i].setAttribute('stroke-dasharray',  linePathsA[i]._len);
    linePathsA[i].setAttribute('stroke-dashoffset', linePathsA[i]._len);
    linePathsB[i].setAttribute('stroke-dasharray',  linePathsB[i]._len);
    linePathsB[i].setAttribute('stroke-dashoffset', linePathsB[i]._len);
  }
}

function updateDrawAnim(now) {
  if (!drawStart) return;
  let allDone = true;
  for (let i = 0; i < N; i++) {
    [[linePathsA[i], i * 2], [linePathsB[i], i * 2 + 1]].forEach(([path, idx]) => {
      const elapsed = now - drawStart - idx * DRAW_STAGGER;
      const len = path._len || 1;
      if (elapsed < 0) {
        allDone = false;
        path.setAttribute('stroke-dashoffset', len);
      } else if (elapsed < DRAW_DURATION) {
        allDone = false;
        path.setAttribute('stroke-dashoffset', len * (1 - easeOut(elapsed / DRAW_DURATION)));
      } else {
        path.removeAttribute('stroke-dasharray');
        path.removeAttribute('stroke-dashoffset');
      }
    });
  }
  if (allDone) drawStart = null;
}

/* ─────────────────────────────
   RAF LOOP
───────────────────────────── */
function rafLoop() {
  const now = performance.now();
  drawLines();
  updateDrawAnim(now);
  requestAnimationFrame(rafLoop);
}

/* ─────────────────────────────
   INIT
───────────────────────────── */
function placeInitial() {
  for (let col = 0; col < 3; col++) {
    const order = shuffle(Array.from({ length: N }, (_, i) => i));
    assignPositions(col, order);
    for (let i = 0; i < N; i++) {
      if (itemEls[col][i]) {
        itemEls[col][i].style.transition = 'none';
        itemEls[col][i].style.top = pos[col][i] + 'px';
      }
    }
  }
}

function init() {
  computeLayout();
  buildDOM();
  placeInitial();

  requestAnimationFrame(() => {
    drawLines();
    startDrawAnim();
    requestAnimationFrame(rafLoop);
  });
}

window.addEventListener('resize', () => {
  computeLayout();
  buildDOM();
  placeInitial();
  updateStyles();
});

init();
</script>
</body>
</html>
